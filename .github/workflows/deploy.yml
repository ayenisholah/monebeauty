name: Mone Beauty CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [20.x]

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NOTIFICATION_FROM_EMAIL: ${{ secrets.NOTIFICATION_FROM_EMAIL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SINCH_APP_ID: ${{ secrets.SINCH_APP_ID }}
      SINCH_REGION: ${{ secrets.SINCH_REGION }}
      SINCH_SERVICE_PLAN_ID: ${{ secrets.SINCH_SERVICE_PLAN_ID }}
      SINCH_ACCESS_KEY_ID: ${{ secrets.SINCH_ACCESS_KEY_ID }}
      SINCH_ACCESS_KEY_SECRET: ${{ secrets.SINCH_ACCESS_KEY_SECRET }}
      SINCH_PROJECT_ID: ${{ secrets.SINCH_PROJECT_ID }}
      SINCH_SMS_SENDER: ${{ secrets.SINCH_SMS_SENDER }}
      PORT: 5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Fix Git safe directory issue
        run: git config --global --add safe.directory "$PWD"

      - name: Clean up Git submodule configurations
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
          git submodule foreach --recursive git config --local --unset-all http.https://github.com/.extraheader || true
          git submodule foreach --recursive git config --local --unset-all core.sshCommand || true

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run database migrations
        if: github.event_name == 'push'
        run: |
          if [ -d prisma/migrations ]; then
            npx prisma migrate deploy
          else
            echo "No Prisma migrations directory found; skipping migrate deploy."
          fi

      - name: Build
        run: npm run build

      - name: Write production environment file
        if: github.event_name == 'push'
        run: |
          {
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}"
            echo "ADMIN_EMAIL=${ADMIN_EMAIL}"
            echo "ADMIN_PASSWORD=${ADMIN_PASSWORD}"
            echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}"
            echo "NOTIFICATION_FROM_EMAIL=${NOTIFICATION_FROM_EMAIL}"
            echo "RESEND_API_KEY=${RESEND_API_KEY}"
            echo "SINCH_APP_ID=${SINCH_APP_ID}"
            echo "SINCH_REGION=${SINCH_REGION}"
            echo "SINCH_SERVICE_PLAN_ID=${SINCH_SERVICE_PLAN_ID}"
            echo "SINCH_ACCESS_KEY_ID=${SINCH_ACCESS_KEY_ID}"
            echo "SINCH_ACCESS_KEY_SECRET=${SINCH_ACCESS_KEY_SECRET}"
            echo "SINCH_PROJECT_ID=${SINCH_PROJECT_ID}"
            echo "SINCH_SMS_SENDER=${SINCH_SMS_SENDER}"
            echo "PORT=${PORT}"
          } > .env.production

      - name: Restart app with PM2
        if: github.event_name == 'push'
        run: pm2 restart monebeauty || pm2 start npm --name monebeauty -- run start
