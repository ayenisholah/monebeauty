name: Mone Beauty CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Fix Git safe directory issue
        run: git config --global --add safe.directory "$PWD"

      - name: Clean up Git submodule configurations
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
          git submodule foreach --recursive git config --local --unset-all http.https://github.com/.extraheader || true
          git submodule foreach --recursive git config --local --unset-all core.sshCommand || true

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Write environment file
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTIFICATION_FROM_EMAIL: ${{ secrets.NOTIFICATION_FROM_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SINCH_APP_ID: ${{ secrets.SINCH_APP_ID }}
          SINCH_REGION: ${{ secrets.SINCH_REGION }}
          SINCH_SERVICE_PLAN_ID: ${{ secrets.SINCH_SERVICE_PLAN_ID }}
          SINCH_ACCESS_KEY_ID: ${{ secrets.SINCH_ACCESS_KEY_ID }}
          SINCH_ACCESS_KEY_SECRET: ${{ secrets.SINCH_ACCESS_KEY_SECRET }}
          SINCH_PROJECT_ID: ${{ secrets.SINCH_PROJECT_ID }}
          SINCH_SMS_SENDER: ${{ secrets.SINCH_SMS_SENDER }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_FINLAND_SHIPPING_RATE_ID: ${{ secrets.STRIPE_FINLAND_SHIPPING_RATE_ID }}
        run: |
          umask 077
          env_file="$(mktemp .env.XXXXXX)"
          trap 'rm -f "$env_file"' EXIT
          {
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
            printf 'NEXT_PUBLIC_SITE_URL=%s\n' "$NEXT_PUBLIC_SITE_URL"
            printf 'ADMIN_EMAIL=%s\n' "$ADMIN_EMAIL"
            printf 'ADMIN_PASSWORD=%s\n' "$ADMIN_PASSWORD"
            printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY"
            printf 'ANTHROPIC_MODEL=%s\n' 'claude-sonnet-5'
            printf 'NOTIFICATION_FROM_EMAIL=%s\n' "$NOTIFICATION_FROM_EMAIL"
            printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY"
            printf 'SINCH_APP_ID=%s\n' "$SINCH_APP_ID"
            printf 'SINCH_REGION=%s\n' "$SINCH_REGION"
            printf 'SINCH_SERVICE_PLAN_ID=%s\n' "$SINCH_SERVICE_PLAN_ID"
            printf 'SINCH_ACCESS_KEY_ID=%s\n' "$SINCH_ACCESS_KEY_ID"
            printf 'SINCH_ACCESS_KEY_SECRET=%s\n' "$SINCH_ACCESS_KEY_SECRET"
            printf 'SINCH_PROJECT_ID=%s\n' "$SINCH_PROJECT_ID"
            printf 'SINCH_SMS_SENDER=%s\n' "$SINCH_SMS_SENDER"
            printf 'CLOUDINARY_CLOUD_NAME=%s\n' "$CLOUDINARY_CLOUD_NAME"
            printf 'CLOUDINARY_API_KEY=%s\n' "$CLOUDINARY_API_KEY"
            printf 'CLOUDINARY_API_SECRET=%s\n' "$CLOUDINARY_API_SECRET"
            printf 'STRIPE_SECRET_KEY=%s\n' "$STRIPE_SECRET_KEY"
            printf 'NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=%s\n' "$NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY"
            printf 'STRIPE_WEBHOOK_SECRET=%s\n' "$STRIPE_WEBHOOK_SECRET"
            printf 'STRIPE_FINLAND_SHIPPING_RATE_ID=%s\n' "$STRIPE_FINLAND_SHIPPING_RATE_ID"
            printf 'PORT=%s\n' '5000'
          } > "$env_file"
          chmod 600 "$env_file"
          mv -f "$env_file" .env
          trap - EXIT

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -d prisma/migrations ]; then
            npx prisma migrate deploy
          else
            echo "No Prisma migrations directory found; skipping migrate deploy."
          fi

      - name: Seed booking baseline (practitioner, services, availability)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:seed

      - name: Verify Claude credentials and model access
        run: npm run chat:check-provider

      - name: Build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run build

      - name: Restart app with PM2
        run: |
          set -euo pipefail

          is_app_online() {
            pm2 jlist | node -e '
              const apps = JSON.parse(require("node:fs").readFileSync(0, "utf8"));
              const app = apps.find((entry) => entry.name === "monebeauty");
              process.exit(app?.pm2_env?.status === "online" ? 0 : 1);
            '
          }

          pm2 startOrReload ecosystem.config.cjs --update-env || true

          if ! is_app_online; then
            echo "PM2 reload did not leave monebeauty online; recreating that process."
            pm2 delete monebeauty || true
            pm2 start ecosystem.config.cjs --only monebeauty --update-env
          fi

          healthy=0
          for attempt in $(seq 1 12); do
            if curl --fail --silent --show-error http://127.0.0.1:5000/api/health; then
              healthy=1
              break
            fi
            echo "Waiting for monebeauty health check ($attempt/12)..."
            sleep 5
          done

          if [ "$healthy" -ne 1 ] || ! is_app_online; then
            echo "monebeauty failed deployment health verification."
            pm2 describe monebeauty || true
            pm2 logs monebeauty --err --lines 100 --nostream || true
            exit 1
          fi

          pm2 save
